<!-- Hamburger button (only shown on mobile, outside the sidebar) -->
<button class="sidebar__hamburger" (click)="openSidebar()" aria-label="Open menu" [class.sidebar__hamburger--hidden]="isOpen()">
  <mat-icon>menu</mat-icon>
</button>

<!-- Overlay (dims content when sidebar is open on mobile) -->
<div
  class="sidebar__overlay"
  [class.sidebar__overlay--visible]="isOpen()"
  (click)="closeSidebar()"
></div>

<!-- Sidebar drawer -->
<div class="sidebar" [class.sidebar--open]="isOpen()">

  <!-- Close button (mobile only) -->
  <button class="sidebar__close-btn" (click)="closeSidebar()" aria-label="Close menu">
    <mat-icon>close</mat-icon>
  </button>

  <!-- Brand -->
  <div class="sidebar__brand">
    <div class="sidebar__logo">
      <mat-icon class="sidebar__logo-icon">spa</mat-icon>
    </div>
    <div class="sidebar__brand-text">
      <h1 class="sidebar__title">Bloomie</h1>
      <p class="sidebar__subtitle">{{ 'nav.subtitle' | translate }}</p>
    </div>
  </div>

  <div class="sidebar__divider"></div>

  <!-- Current user avatar -->
  <div class="sidebar__user">
    <div class="sidebar__user-avatar">
      @if (iamStore.currentUser()?.photoUrl) {
        <img class="sidebar__user-avatar-img" [src]="iamStore.currentUser()!.photoUrl!" alt="Profile photo" />
      } @else {
        <mat-icon class="sidebar__user-avatar-icon">person</mat-icon>
      }
    </div>
    <span class="sidebar__user-name">{{ iamStore.currentUser()?.name }}</span>
  </div>

  <div class="sidebar__section-label">{{ 'nav.mainMenu' | translate }}</div>

  <!-- Nav -->
  <nav class="sidebar__nav">
    @for (item of navItems; track item.path) {
      <a
        class="sidebar__item"
        [routerLink]="item.path"
        routerLinkActive="sidebar__item--active"
        (click)="closeSidebar()"
      >
        <mat-icon class="sidebar__icon">{{ item.icon }}</mat-icon>
        <span class="sidebar__label">{{ item.labelKey | translate }}</span>
        <span class="sidebar__dot"></span>
      </a>
    }
  </nav>

</div>
