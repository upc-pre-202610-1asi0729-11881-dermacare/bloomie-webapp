<div class="sa">

  <div class="sa__content">

    <!-- Pulsing icon -->
    <div class="sa__icon-wrap">
      <div class="sa__ring sa__ring--1"></div>
      <div class="sa__ring sa__ring--2"></div>
      <div class="sa__ring sa__ring--3"></div>
      <mat-icon class="sa__icon">face_retouching_natural</mat-icon>
    </div>

    <h2 class="sa__title">{{ 'skinAnalysis.scanAnalyzing.title' | translate }}</h2>

    <!-- Cycling step message -->
    <p class="sa__step">{{ currentStep() }}</p>

    <!-- Progress bar -->
    <div class="sa__bar-wrap">
      <div class="sa__bar">
        <div class="sa__bar-fill" [style.width.%]="progress()"></div>
      </div>
      <span class="sa__pct">{{ progress() }}%</span>
    </div>

  </div>

  <div class="sa__footer">
    <button class="sa__cancel" (click)="navigateBack()">
      {{ 'skinAnalysis.scanAnalyzing.backBtn' | translate }}
    </button>
  </div>

</div>
