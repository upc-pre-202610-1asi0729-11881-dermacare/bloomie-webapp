<div class="scan-progress">

  <div class="scan-progress__header">
    <button class="scan-progress__back-btn" (click)="navigateBack()" aria-label="Go back">
      <mat-icon>arrow_back</mat-icon>
    </button>
  </div>

  <div class="scan-progress__content">

    @if (!hasFailed()) {
      <mat-icon class="scan-progress__icon scan-progress__icon--success">check_circle</mat-icon>
      <h2 class="scan-progress__title">{{ 'skinAnalysis.scanProgress.title' | translate }}</h2>
      <p class="scan-progress__subtitle">{{ 'skinAnalysis.scanProgress.subtitle' | translate }}</p>
      <button class="scan-progress__primary-btn" (click)="onContinue()">
        {{ 'skinAnalysis.scanProgress.continueBtn' | translate }}
      </button>
    } @else {
      <mat-icon class="scan-progress__icon scan-progress__icon--failed">error</mat-icon>
      <h2 class="scan-progress__title">{{ 'skinAnalysis.scanProgress.failedTitle' | translate }}</h2>
      <p class="scan-progress__subtitle">{{ 'skinAnalysis.scanProgress.failedSubtitle' | translate }}</p>
      <button class="scan-progress__primary-btn" (click)="onRetry()">
        {{ 'skinAnalysis.scanProgress.retryBtn' | translate }}
      </button>
    }

  </div>

</div>
